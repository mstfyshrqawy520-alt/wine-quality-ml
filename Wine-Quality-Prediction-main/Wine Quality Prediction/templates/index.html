<!DOCTYPE html>
<html>
<head>
  <!-- Logo Button ثابت في الزاوية -->
<!-- Logo Image Button -->



    <title>Wine Quality Prediction</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f7f7f7;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .alert-custom {
            background-color: #e9f7ef;
            color: #155724;
            border-color: #c3e6cb;
        }
        label small {
            display: block;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
<div style="position: fixed; top: 20px; right: 20px; text-align: center; z-index: 1000;">
    <a href="{{ url_for('profile') }}" target="_blank">
        <img src="{{ url_for('static', filename='logo.jfif') }}" 
             alt="mostafa" 
             style="
                 width: 60px;
                 height: 60px;
                 border-radius: 50%;
                 box-shadow: 0 4px 6px rgba(0,0,0,0.2);
                 transition: transform 0.2s;
             "
             onmouseover="this.style.transform='scale(1.2)';" 
             onmouseout="this.style.transform='scale(1)';">
    </a>
    <div style="font-size: 12px; color: #555; margin-top: 5px;">
        Contact Me
    </div>
</div>


<div class="container mt-5">
    <h2 class="text-center mb-4 text-primary">Wine Quality Prediction</h2>
    <form action="/predict" method="post">
        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Fixed Acidity <small>(4.0 - 16.0)</small></label>
                <input type="number" step="0.01" name="fixed_acidity" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label>Volatile Acidity <small>(0.1 - 1.5)</small></label>
                <input type="number" step="0.01" name="volatile_acidity" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label>Citric Acid <small>(0.0 - 1.0)</small></label>
                <input type="number" step="0.01" name="citric_acid" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label>Residual Sugar <small>(0.9 - 15.0)</small></label>
                <input type="number" step="0.01" name="residual_sugar" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label>Chlorides <small>(0.012 - 0.2)</small></label>
                <input type="number" step="0.001" name="chlorides" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label>Free Sulfur Dioxide <small>(1 - 72)</small></label>
                <input type="number" step="1" name="free_sulfur_dioxide" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label>Total Sulfur Dioxide <small>(6 - 289)</small></label>
                <input type="number" step="1" name="total_sulfur_dioxide" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label>Density <small>(0.9900 - 1.0040)</small></label>
                <input type="number" step="0.0001" name="density" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label>pH <small>(2.7 - 4.0)</small></label>
                <input type="number" step="0.01" name="pH" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label>Sulphates <small>(0.3 - 2.0)</small></label>
                <input type="number" step="0.01" name="sulphates" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label>Alcohol <small>(8.0 - 14.9)</small></label>
                <input type="number" step="0.1" name="alcohol" class="form-control" required>
            </div>
        </div>
        <button type="submit" class="btn btn-success btn-block">Predict</button>
    </form>

    {% if prediction_text %}
    <div class="alert alert-custom mt-4 text-center">
        <h5>{{ prediction_text }}</h5>
        <p>Values Entered:</p>
        <ul style="list-style: none; padding: 0;">
            {% for key, value in request.form.items() %}
            <li><strong>{{ key.replace('_',' ').title() }}:</strong> {{ value }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

</div>
</body>
</html>
