<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f7f7f7;
            font-family: Arial, sans-serif;
        }
        .links-container {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .links-container a {
            display: block;
            margin: 15px 0;
            font-size: 20px;
            color: #007bff;
            text-decoration: none;
            transition: transform 0.2s, color 0.2s;
        }
        .links-container a:hover {
            transform: scale(1.1);
            color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="links-container">
        <h2>Connect with Me</h2>

        <a href="https://www.facebook.com/mstfy.alshrqawy.195445" target="_blank">Facebook</a>
        <a href="https://github.com/mostafa0076" target="_blank">GitHub</a>
    </div>
</body>
</html>
